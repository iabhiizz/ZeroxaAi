<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsent</title>

<style>
body{
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
}

/* sections */
.section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* text */
.big{
  font-size:28px;
  max-width:320px;
  line-height:1.4;
}

/* background gif */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(10px) brightness(0.4);
  z-index:-1;
}

/* chat box */
.chat{
  background:#1a1a1a;
  padding:15px;
  border-radius:15px;
  text-align:left;
  max-width:280px;
}

.msg{
  background:#2a2a2a;
  padding:8px;
  border-radius:10px;
  margin-top:10px;
}

/* fade animation */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<img class="bg" src="https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif">

<div class="section fade">
  <div class="big">It’s 2:17 AM</div>
</div>

<div class="section fade">
  <div class="big">You open the chat again</div>
</div>

<div class="section fade">
  <div class="chat">
    <div>Typing...</div>
    <div class="msg">Hey… I was just thinking about you</div>
  </div>
</div>

<div class="section fade">
  <div class="big">You delete it</div>
</div>

<div class="section fade">
  <div class="big">Calling...</div>
</div>

<div class="section fade">
  <div class="big">
    Sach bolu… mujhe lagta tha sab theek ho jayega.  
    Par tu gayi nahi… tu bas baat karna band kar di.  
    Aur main… wahi ruk gaya.
  </div>
</div>

<div class="section fade">
  <div class="big">You won’t text her</div>
</div>

<div class="section fade">
  <div class="big">But you want to</div>
</div>

<div class="section fade">
  <div class="big">She doesn’t text either</div>
</div>

<script>
const sections = document.querySelectorAll(".fade");

function reveal(){
  sections.forEach(sec=>{
    let top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
}

window.addEventListener("scroll", reveal);
reveal();
</script>

</body>
</html>
