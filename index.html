<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* scene */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:20px;
  opacity:0;
  transform:scale(1.05);
  transition:0.5s ease;
}

.show{
  opacity:1;
  transform:scale(1);
}

/* glitch */
@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(2px,-2px)}
  60%{transform:translate(-1px,1px)}
  80%{transform:translate(1px,-1px)}
  100%{transform:translate(0)}
}

/* phone ui */
.phone{
  width:300px;
  height:550px;
  background:#111;
  border-radius:25px;
  padding:15px;
  box-shadow:0 0 30px rgba(255,255,255,0.1);
}

.chat{
  font-size:14px;
  text-align:left;
}

.msg{
  background:#222;
  padding:8px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div id="s1" class="scene show">2:17 AM</div>

<div id="s2" class="scene">
  <div class="phone">Opening chat...</div>
</div>

<div id="s3" class="scene">
  <div class="phone chat">
    <div class="msg">Typing...</div>
    <div class="msg" id="typing">Hey...</div>
  </div>
</div>

<div id="s4" class="scene">Deleted.</div>

<div id="s5" class="scene">Calling...</div>

<div id="s6" class="scene">Call ended.</div>

<div id="s7" class="scene">You moved on.</div>

<div id="s8" class="scene" style="animation:glitch 0.3s infinite">
  Or did you?
</div>

<div id="s9" class="scene">You still check her profile.</div>

<div id="s10" class="scene">You just don’t admit it.</div>

<script>

let scenes = ["s1","s2","s3","s4","s5","s6","s7","s8","s9","s10"];
let i=0;

function next(){
  document.getElementById(scenes[i]).classList.remove("show");
  i++;
  if(i < scenes.length){
    document.getElementById(scenes[i]).classList.add("show");
  }
}

setInterval(next,2000);

/* typing delete */
setTimeout(()=>{
  document.getElementById("typing").innerHTML="...";
},3500);

</script>

</body>
</html>
