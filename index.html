<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsent</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
  background:black;
}

/* background gif */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(8px) brightness(0.5);
  z-index:0;
}

/* dark overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:1;
}

/* main scene */
#scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2;
}

/* text */
.text{
  max-width:350px;
  font-size:18px;
  line-height:1.6;
  opacity:0;
  transition:1.2s;
}

.show{ opacity:1 }

/* chat bubble */
.chat{
  background:#1a1a1a;
  padding:10px;
  border-radius:12px;
  margin-top:15px;
  font-size:14px;
  text-align:left;
}

/* call */
.call{
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- background GIF -->
<img class="bg" src="https://media.giphy.com/media/3o7TKtnuHOHHUjR38Y/giphy.gif">

<div class="overlay"></div>

<div id="scene">
  <div id="content"></div>
</div>

<audio id="rainSound" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>
let c = document.getElementById("content");

/* scene helper */
function show(html){
  c.innerHTML = `<div class="text">${html}</div>`;
  setTimeout(()=> document.querySelector(".text").classList.add("show"),100);
}

/* timeline */
setTimeout(()=>{

  document.getElementById("rainSound").play();

  show("2:17 AM…");

  setTimeout(()=>{
    show("You open the chat again.");
  },4000);

  setTimeout(()=>{
    c.innerHTML = `
    <div class="text show">
      <div>Typing…</div>
      <div class="chat" id="msg">Hey… I was just thinking about you</div>
    </div>`;
  },8000);

  setTimeout(()=>{
    document.getElementById("msg").innerHTML="…";
  },11000);

  setTimeout(()=>{
    document.getElementById("msg").style.opacity="0.3";
  },13000);

  setTimeout(()=>{
    c.innerHTML = `
    <div class="text show">
      Calling…
      <div class="call">ringing…</div>
    </div>`;
  },16000);

  setTimeout(()=>{
    show("Call ended.");
  },20000);

  setTimeout(()=>{
    show(`
    Sach bolu… mujhe lagta tha sab theek ho jayega.  
    Par tu gayi nahi… tu bas baat karna band kar di.  
    Aur shayad sabse zyada dard isi baat ka hai…  
    ki main ab bhi wahi hoon… aur tu aage badh gayi.
    `);
  },24000);

  setTimeout(()=>{
    show("You won’t text her.");
  },38000);

  setTimeout(()=>{
    show("But you want to.");
  },45000);

  setTimeout(()=>{
    show("She doesn’t text either.");
  },52000);

},1000);

</script>

</body>
</html>
